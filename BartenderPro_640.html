<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🍹 Bartender Pro — Cocktails</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#080808;color:#f0ede6;min-height:100vh}

/* ── HEADER ── */
header{background:linear-gradient(135deg,#0c0800,#1e1400,#0c0800);
  border-bottom:1px solid #2a1e00;padding:14px 16px;
  position:sticky;top:0;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.h1{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.h1 h1{font-size:20px;font-weight:700;color:#f2cc76;line-height:1.1}
.h1 p{font-size:11px;color:#888;margin-top:2px}
#badge{margin-left:auto;background:#1a1200;border:1px solid #3a2800;
  border-radius:20px;padding:3px 12px;font-size:12px;color:#d4a843;white-space:nowrap}
.srch{position:relative;margin-bottom:10px}
.srch input{width:100%;padding:10px 38px 10px 38px;background:#181818;
  border:1.5px solid #2e2a22;border-radius:10px;color:#f0ede6;font-size:14px}
.srch input:focus{outline:none;border-color:#8a6820}
.srch input::placeholder{color:#555}
.srch .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:15px;opacity:.5;pointer-events:none}
#clr{position:absolute;right:11px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#777;cursor:pointer;font-size:17px;
  display:none;padding:0;line-height:1}
.frow{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:6px}
.frow::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;padding:5px 12px;border-radius:18px;border:1.5px solid #252525;
  background:transparent;color:#888;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.fb:hover{border-color:#5a4a20;color:#d4a843}
.fb.on{background:#231a00;border-color:#8a6820;color:#f2cc76;font-weight:600}
.brow{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
.brow::-webkit-scrollbar{display:none}
.bb{flex-shrink:0;padding:4px 10px;border-radius:18px;border:1px solid #202020;
  background:transparent;color:#666;font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s}
.bb:hover{border-color:#3a3a3a;color:#bbb}
.bb.on{background:#181818;border-color:#484848;color:#ddd}

/* ── MAIN ── */
main{padding:12px}
.rbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
#rc{font-size:12px;color:#777}
.vtg{display:flex;gap:3px}
.vb{padding:5px 8px;background:transparent;border:1px solid #1e1e1e;
  border-radius:6px;cursor:pointer;font-size:13px;color:#666}
.vb.on{background:#1a1a1a;border-color:#3a3a3a;color:#ccc}

/* ── GRID ── */
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
#grid.lv{grid-template-columns:1fr}

/* ── CARD ── */
.card{background:#141414;border:1px solid #202020;border-radius:12px;
  padding:13px;cursor:pointer;transition:border-color .18s,transform .18s;
  position:relative;overflow:hidden}
.card:hover{border-color:#3a3020;transform:translateY(-2px)}
.card:hover::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#a07820,transparent)}
.ce{font-size:24px;margin-bottom:7px}
.cn{font-size:13px;font-weight:600;color:#ede8e0;margin-bottom:6px;line-height:1.3}
.ct{display:flex;flex-wrap:wrap;gap:4px}
.tg{font-size:10px;padding:2px 7px;border-radius:10px}
.tg-g{background:#1a1400;color:#d4a843;border:1px solid #2a2000}
.tg-b{background:#111;color:#777;border:1px solid #1e1e1e}
.tg-r{background:#0d190d;color:#5a9a5a;border:1px solid #1a2e1a}

/* ── LIST CARD ── */
#grid.lv .card{display:flex;align-items:center;gap:12px;padding:10px 14px}
#grid.lv .ce{font-size:20px;margin:0;min-width:26px;text-align:center}
#grid.lv .cn{margin:0;flex:1;font-size:14px}
#grid.lv .ct{flex-wrap:nowrap;gap:4px}

/* ── EMPTY ── */
#empty{display:none;text-align:center;padding:60px 16px;color:#555}
#empty .ei{font-size:42px;margin-bottom:10px}

/* ── MODAL ── */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;
  overflow-y:auto;padding:16px}
#ov.open{display:flex;justify-content:center;align-items:flex-start;padding-top:20px}
#mod{background:#101010;border:1px solid #222210;border-radius:16px;
  max-width:560px;width:100%;animation:su .2s ease}
@keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
.mh{background:linear-gradient(135deg,#0a0800,#1e1600,#0a0800);
  padding:20px;border-bottom:1px solid #2a2000;position:relative}
.mx{position:absolute;top:12px;right:12px;background:#1a1a1a;border:1px solid #282828;
  border-radius:50%;width:30px;height:30px;cursor:pointer;color:#888;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:background .15s}
.mx:hover{background:#252525;color:#ccc}
.me{font-size:34px;margin-bottom:8px}
.mn{font-size:19px;font-weight:700;color:#f2cc76;margin-bottom:8px;padding-right:36px;line-height:1.2}
.mm{display:flex;flex-wrap:wrap;gap:5px}
.mb{font-size:10.5px;padding:2px 9px;border-radius:12px;
  background:#1a1200;border:1px solid #3a2800;color:#d4a843}

/* BODY */
.mbod{padding:16px}
.sl{font-size:10.5px;font-weight:700;color:#a07820;text-transform:uppercase;
  letter-spacing:.8px;margin:16px 0 7px;display:flex;align-items:center;gap:6px}
.sl:first-child{margin-top:0}
.sl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#a07820,transparent)}

/* RECIPE CARD - como no arquivo */
.rec-card{background:#0e0e0e;border:1px solid #1e1e1e;border-radius:10px;
  padding:12px 14px;font-size:14px;color:#d8d0c0;line-height:1.7}
.rec-card strong{color:#f2cc76;font-weight:600}

.modo-card{background:#0e0e0e;border:1px solid #1e1e1e;border-radius:10px;
  padding:12px 14px;font-size:13.5px;color:#c0b8a8;line-height:1.7}

.guard-box{display:flex;align-items:center;gap:8px;background:#0e0e0e;
  border:1px solid #1e1e1e;border-radius:10px;padding:10px 14px;
  font-size:13.5px;color:#a89880}

.htags{display:flex;flex-wrap:wrap;gap:5px}
.htag{padding:3px 9px;background:#0d190d;border:1px solid #1e2e1e;
  border-radius:10px;font-size:12px;color:#5a9a6a}

.cur-box{background:linear-gradient(135deg,#0d0d08,#141008);
  border:1px solid #2a2400;border-left:3px solid #a07820;border-radius:10px;
  padding:11px 14px;font-size:13px;color:#c8b888;line-height:1.65;font-style:italic}

.nodata{color:#3a3a3a;font-style:italic;font-size:13px;padding:2px 0}

/* SCROLL */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#080808}
::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:3px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){
  #grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .mn{font-size:17px}
}
</style>
</head>
<body>

<header>
  <div class="h1">
    <div>
      <h1>🍹 Bartender Pro</h1>
      <p>Receituário Completo de Cocktails</p>
    </div>
    <div id="badge">640 drinks</div>
  </div>
  <div class="srch">
    <span class="ico">🔍</span>
    <input type="text" id="si" placeholder="Buscar drink, ingrediente, origem..." oninput="buscar()">
    <button id="clr" onclick="limpar()">&#x2715;</button>
  </div>
  <div class="frow" id="gfil"></div>
  <div class="brow" id="bfil"></div>
</header>

<main>
  <div class="rbar">
    <span id="rc">640 drinks</span>
    <div class="vtg">
      <button class="vb on" id="gb" onclick="sv(0)" title="Grade">&#x229E;</button>
      <button class="vb" id="lb" onclick="sv(1)" title="Lista">&#x2630;</button>
    </div>
  </div>
  <div id="grid"></div>
  <div id="empty">
    <div class="ei">&#x1F50D;</div>
    <h3 style="color:#888;margin-bottom:6px">Nenhum drink encontrado</h3>
    <p>Tente outro termo ou filtro</p>
  </div>
</main>

<div id="ov" onclick="fora(event)">
  <div id="mod">
    <div class="mh">
      <button class="mx" onclick="fechar()">&#x2715;</button>
      <div class="me" id="me"></div>
      <div class="mn" id="mn"></div>
      <div class="mm" id="mm"></div>
    </div>
    <div class="mbod" id="mb"></div>
  </div>
</div>

"COCKTAILS INSPIRADOS EM CELEBRIDADES:","orig":"","rec":"60 ml de vodka clara | 30 ml de licor de cura\u00e7ao azul | 30 ml de suco de lim\u00e3o fresco | 15 ml de xarope de agave | Gelo | Gelo seco (opcional, para efeito visual - manuseie com extrema cautela e nunca ingira!) | Twist de lim\u00e3o para guarni\u00e7\u00e3o | Preparo: | Em uma coqueteleira com gelo, adicione a vodka, o licor de cura\u00e7ao azul, o suco de lim\u00e3o e o xarope de agave. | Agite bem at\u00e9 ficar bem gelado. | Coe para um copo cocktail resfriado ou um copo baixo com gelo. | Se usar gelo seco para efeito visual, adicione um pequeno peda\u00e7o ao copo imediatamente antes de servir e avise o consumidor para n\u00e3o tocar ou ingerir. O efeito de fuma\u00e7a durar\u00e1 pouco tempo. | Guarne\u00e7a com um twist de lim\u00e3o.","modo":"","copo":"","guard":"","cur":"","harm":""},{"n":"MOSCOW MULE BY MARCELO SERRANO","e":"\ud83e\uded9","g":"Celebridades","b":"Vodka","cat":"COCKTAILS INSPIRADOS EM CELEBRIDADES:","orig":"","rec":"50ml de Vodka | 20ml de Suco de Lim\u00e3o | 20ml de Xarope de A\u00e7\u00facar | 5 Gotas de Angostura. | Espuma de Gengibre | Preparo: Bater todos os ingredientes na coqueteleira, menos a espuma de gengibre. Finalizar com a espuma de gengibre, cobrindo o a mistura. Decorar com fatia de gengibre ou raspas de gengibre.","modo":"","copo":"","guard":"","cur":"","harm":""},{"n":"COSMOPOLITAN BY DALE DEGROFF","e":"\ud83e\uddca","g":"Celebridades","b":"Vodka","cat":"COCKTAILS INSPIRADOS EM CELEBRIDADES:","orig":"","rec":"50ml de Vodka Citron | 15ml de Cointreau | 15ml de Suco de Lim\u00e3o | 30ml de Suco de Cranberry | Preparo: Bater todos os ingredientes na coqueteleira, servir em ta\u00e7a coquetel, finalizar com \u00f3leo de casaca de laranja. | 117","modo":"","copo":"","guard":"","cur":"","harm":""}];

var GRUPOS=['Todos','Collins & Fizz','Spritz & Aperitivos','Highballs','Tropicais',
  'Contemporâneos','Clássicos IBA','Modernos IBA','Tiki','Celebridades',
  'Champagne','Cerveja','Ásia Oriental','Ásia & Oriente Médio','África','Oceania','Outros'];

var BASES=['Todos','Gin','Vodka','Tequila','Whisky','Cachaça','Rum',
  'Cognac/Brandy','Aperitivo','Espumante','Cerveja','Destilado Asiático','Outros'];

var grupo='Todos', base='Todos', termo='', modo=0;

function init(){
  var gf=document.getElementById('gfil');
  GRUPOS.forEach(function(s){
    var b=document.createElement('button');
    b.className='fb'+(s==='Todos'?' on':'');
    b.textContent=s;
    b.onclick=function(){
      grupo=s;
      document.querySelectorAll('.fb').forEach(function(x){x.classList.remove('on')});
      b.classList.add('on');
      render();
    };
    gf.appendChild(b);
  });
  var bf=document.getElementById('bfil');
  BASES.forEach(function(s){
    var b=document.createElement('button');
    b.className='bb'+(s==='Todos'?' on':'');
    b.textContent=s;
    b.onclick=function(){
      base=s;
      document.querySelectorAll('.bb').forEach(function(x){x.classList.remove('on')});
      b.classList.add('on');
      render();
    };
    bf.appendChild(b);
  });
  render();
}

function buscar(){
  termo=document.getElementById('si').value.toLowerCase();
  document.getElementById('clr').style.display=termo?'block':'none';
  render();
}

function limpar(){
  document.getElementById('si').value='';
  termo='';
  document.getElementById('clr').style.display='none';
  render();
}

function sv(m){
  modo=m;
  document.getElementById('grid').className=m?'lv':'';
  document.getElementById('gb').className='vb'+(m===0?' on':'');
  document.getElementById('lb').className='vb'+(m===1?' on':'');
}

function filtrar(){
  return D.filter(function(d){
    if(grupo!=='Todos'&&d.g!==grupo) return false;
    if(base!=='Todos'&&d.b!==base) return false;
    if(!termo) return true;
    var t=(d.n+' '+d.b+' '+d.g+' '+d.orig+' '+d.rec+' '+d.cat).toLowerCase();
    return t.indexOf(termo)>=0;
  });
}

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(){
  var list=filtrar();
  var g=document.getElementById('grid');
  var em=document.getElementById('empty');
  var rc=document.getElementById('rc');
  var bd=document.getElementById('badge');
  rc.textContent=list.length+' drinks';
  bd.textContent=list.length+' drinks';
  if(!list.length){g.innerHTML='';em.style.display='block';return;}
  em.style.display='none';
  var html='';
  list.forEach(function(d,i){
    var idx=D.indexOf(d);
    var hasR=!!(d.rec||d.modo);
    var delay=Math.min(i*6,150);
    if(!modo){
      html+='<div class="card" onclick="abrir('+idx+')" style="animation:fi .2s ease '+delay+'ms both">';
      html+='<div class="ce">'+esc(d.e)+'</div>';
      html+='<div class="cn">'+esc(d.n)+'</div>';
      html+='<div class="ct">';
      html+='<span class="tg tg-g">'+esc(d.g)+'</span>';
      html+='<span class="tg tg-b">'+esc(d.b)+'</span>';
      if(hasR) html+='<span class="tg tg-r">receita</span>';
      html+='</div></div>';
    } else {
      html+='<div class="card" onclick="abrir('+idx+')" style="animation:fi .15s ease '+delay+'ms both">';
      html+='<div class="ce">'+esc(d.e)+'</div>';
      html+='<div class="cn">'+esc(d.n)+'</div>';
      html+='<div class="ct"><span class="tg tg-g">'+esc(d.g)+'</span><span class="tg tg-b">'+esc(d.b)+'</span>'+(hasR?'<span class="tg tg-r">&#x2713;</span>':'')+'</div>';
      html+='</div>';
    }
  });
  g.innerHTML=html;
}

function abrir(i){
  var d=D[i];
  document.getElementById('me').textContent=d.e||'\uD83C\uDF78';
  document.getElementById('mn').textContent=d.n||'';
  var meta=[];
  if(d.orig) meta.push(d.orig);
  if(d.copo) meta.push(d.copo);
  meta.push(d.g);
  meta.push(d.b);
  document.getElementById('mm').innerHTML=meta.map(function(m){return '<span class="mb">'+esc(m)+'</span>';}).join('');
  
  var body='';
  
  // Receita - exatamente como no arquivo
  if(d.rec){
    body+='<div class="sl">&#x1F376; Receita (Ingredientes)</div>';
    body+='<div class="rec-card">'+esc(d.rec)+'</div>';
  } else {
    body+='<div class="sl">&#x1F376; Receita (Ingredientes)</div><div class="nodata">Receita não disponível.</div>';
  }
  
  // Modo
  if(d.modo){
    body+='<div class="sl">&#x1F4CB; Modo de Preparo</div>';
    body+='<div class="modo-card">'+esc(d.modo)+'</div>';
  }
  
  // Guarnição
  if(d.guard && d.guard.toLowerCase()!=='n/d' && d.guard.toLowerCase()!=='n / d'){
    body+='<div class="sl">&#x2728; Guarnição</div>';
    body+='<div class="guard-box"><span>&#x1F33F;</span><span>'+esc(d.guard)+'</span></div>';
  }
  
  // Harmonização
  if(d.harm && d.harm.toLowerCase()!=='n/d'){
    body+='<div class="sl">&#x1F37D;&#xFE0F; Harmonização</div>';
    body+='<div class="htags">';
    var parts=d.harm.split(/[,;]/);
    parts.forEach(function(p){if(p.trim())body+='<span class="htag">'+esc(p.trim())+'</span>';});
    body+='</div>';
  }
  
  // Curiosidade
  if(d.cur && d.cur.toLowerCase()!=='n/d'){
    body+='<div class="sl">&#x1F4A1; Curiosidade</div>';
    body+='<div class="cur-box">'+esc(d.cur)+'</div>';
  }
  
  document.getElementById('mb').innerHTML=body;
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function fechar(){
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow='';
}

function fora(e){
  if(e.target===document.getElementById('ov')) fechar();
}

document.addEventListener('keydown',function(e){if(e.key==='Escape')fechar();});

init();
</script>
