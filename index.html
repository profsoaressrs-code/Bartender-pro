<title>🍹 Bartender Pro</title>
<style>
:root{
  --gold:#D4A843;--gold-l:#F2CC76;--gold-d:#8A6010;
  --bg:#0A0800;--bg1:#110E00;--bg2:#181400;--bg3:#1E1A00;
  --bd:#252000;--bd2:#302A00;
  --tx:#F0EDE6;--tx2:#C0B898;--tx3:#888060;
  --grn:#4A8A5A;--grn-b:#0D180D;--grn-bd:#1A2E1A;
  --rad:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--tx);
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ── HEADER ─────────────────────────── */
#hdr{
  background:var(--bg1);
  border-bottom:1px solid var(--bd2);
  padding:env(safe-area-inset-top,0) 0 0;
  flex-shrink:0;
  padding-top:max(env(safe-area-inset-top),10px);
}
.htop{display:flex;align-items:center;padding:0 14px 10px}
.hlogo{font-size:22px;margin-right:8px}
.htitle h1{font-size:17px;font-weight:700;color:var(--gold-l);line-height:1}
.htitle p{font-size:10px;color:var(--tx3);margin-top:2px}
#badge{
  margin-left:auto;background:var(--bg3);
  border:1px solid var(--bd2);border-radius:20px;
  padding:3px 10px;font-size:11px;color:var(--gold);white-space:nowrap
}

/* ── SEARCH ─────────────────────────── */
.srch{position:relative;padding:0 12px 8px}
.srch input{
  width:100%;padding:10px 34px 10px 36px;
  background:var(--bg2);border:1px solid var(--bd2);
  border-radius:10px;color:var(--tx);font-size:14px;
  -webkit-appearance:none;appearance:none;
}
.srch input:focus{outline:none;border-color:var(--gold-d)}
.srch input::placeholder{color:var(--tx3)}
.s-ico{position:absolute;left:22px;top:50%;transform:translateY(-50%);
  font-size:14px;opacity:.5;pointer-events:none;padding-bottom:8px}
#xbtn{position:absolute;right:22px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--tx3);font-size:17px;
  display:none;padding:4px;cursor:pointer;line-height:1;padding-bottom:8px}

/* ── FILTER CHIPS ───────────────────── */
.chips-wrap{padding:0 12px 10px}
.chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:5px 12px;border-radius:16px;
  border:1px solid var(--bd);background:transparent;
  color:var(--tx3);font-size:11.5px;cursor:pointer;white-space:nowrap;
  -webkit-appearance:none;transition:all .15s
}
.chip.on{background:var(--bg3);border-color:var(--gold-d);color:var(--gold-l);font-weight:600}

/* ── LIST ───────────────────────────── */
#list{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#rc{padding:6px 14px 4px;font-size:11px;color:var(--tx3)}
#rows{padding:4px 10px 40px}
.row{
  display:flex;align-items:center;gap:10px;
  padding:10px 10px;background:var(--bg2);
  border:1px solid var(--bd);border-radius:var(--rad);
  margin-bottom:6px;cursor:pointer;min-height:54px;
  transition:border-color .15s
}
.row:active,.row:hover{background:var(--bg3);border-color:var(--bd2)}
.dem{font-size:22px;min-width:30px;text-align:center;flex-shrink:0;line-height:1}
.dinf{flex:1;min-width:0}
.dn{font-size:13px;font-weight:600;color:#EDE8D8;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.dtg{display:flex;gap:4px;flex-wrap:wrap}
.tg{font-size:10px;padding:2px 7px;border-radius:8px;line-height:1.4}
.tg-g{background:#1A1200;color:#C49030;border:1px solid #2A2000}
.tg-r{background:var(--grn-b);color:var(--grn);border:1px solid var(--grn-bd)}
.darr{color:#3A3A2A;font-size:20px;flex-shrink:0;font-weight:300}
#empty{display:none;text-align:center;padding:60px 20px;color:var(--tx3)}
#empty .ei{font-size:44px;margin-bottom:12px}

/* ── MODAL ──────────────────────────── */
#ov{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.88);z-index:999;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
#ov.open{display:block}
#md{
  background:#0C0A00;
  border-radius:18px 18px 0 0;
  margin-top:44px;
  min-height:calc(100vh - 44px);
  min-height:calc(100dvh - 44px);
  padding-bottom:env(safe-area-inset-bottom,20px);
}
.drag-bar{
  width:36px;height:4px;background:var(--bd2);
  border-radius:2px;margin:10px auto 0;
}
.mhero{
  background:linear-gradient(160deg,#1A1500 0%,#100D00 100%);
  padding:14px 16px 16px;
  border-bottom:1px solid var(--bd2);position:relative;
}
#mcls{
  position:absolute;top:12px;right:12px;
  width:30px;height:30px;background:var(--bg3);
  border:1px solid var(--bd);border-radius:50%;
  cursor:pointer;color:var(--tx3);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  -webkit-appearance:none;border:none;
}
#mcls:active{background:var(--bg2)}
.memo{font-size:36px;margin-bottom:8px;line-height:1}
.mname{font-size:18px;font-weight:700;color:var(--gold-l);
  padding-right:40px;line-height:1.25;margin-bottom:10px}
.mmeta{display:flex;flex-wrap:wrap;gap:5px}
.mbdg{font-size:10.5px;padding:3px 9px;border-radius:10px;
  background:#1A1200;border:1px solid #3A2800;color:var(--gold)}

/* ── MODAL BODY ─────────────────────── */
.mbody{padding:14px 14px 32px}
.lbl{
  font-size:10px;font-weight:700;color:var(--gold-d);
  text-transform:uppercase;letter-spacing:.9px;
  margin:18px 0 7px;
  display:flex;align-items:center;gap:6px;
}
.lbl:first-child{margin-top:0}
.lbl::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--gold-d),transparent)}
.rbox{
  background:#110F00;border:1px solid #201C00;border-radius:10px;
  padding:13px 14px;font-size:14px;color:#D8D0B8;line-height:1.8;
  font-weight:400;
}
.mbox{
  background:#110F00;border:1px solid #201C00;border-radius:10px;
  padding:13px 14px;font-size:13.5px;color:#B8B090;line-height:1.8;
}
.gbox{
  background:#110F00;border:1px solid #201C00;border-radius:10px;
  padding:11px 14px;font-size:13.5px;color:#A09060;
  display:flex;align-items:flex-start;gap:8px;
}
.htags{display:flex;flex-wrap:wrap;gap:6px}
.htag{
  padding:4px 10px;background:#0D160D;
  border:1px solid #1C2C1C;border-radius:8px;
  font-size:12px;color:#4A8A5A;
}
.cbox{
  background:#0F0D00;
  border:1px solid #282200;border-left:3px solid var(--gold-d);
  border-radius:10px;padding:13px 14px;
  font-size:13px;color:#C0B070;line-height:1.75;font-style:italic;
}
.nd{color:#404030;font-style:italic;font-size:13px;padding:2px 0}

/* ── SCROLLBAR ──────────────────────── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* ── INSTALL BANNER ─────────────────── */
#ibanner{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;
  background:#1A1600;border-top:1px solid var(--bd2);
  padding:12px 16px;
  padding-bottom:max(12px,env(safe-area-inset-bottom));
  flex-direction:column;gap:8px;
}
#ibanner.show{display:flex}
.ib-row{display:flex;align-items:center;gap:10px}
.ib-icon{font-size:24px}
.ib-text{flex:1}
.ib-text strong{font-size:13px;color:var(--gold-l);display:block;margin-bottom:2px}
.ib-text span{font-size:11px;color:var(--tx3)}
.ib-close{background:none;border:none;color:var(--tx3);font-size:18px;cursor:pointer;padding:4px}
.ib-ios{font-size:11.5px;color:var(--tx2);line-height:1.6;
  background:var(--bg2);border-radius:8px;padding:8px 10px}
.ib-ios b{color:var(--gold-l)}
#ibtn{
  background:var(--gold-d);border:none;color:#FFF8E0;
  padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;flex-shrink:0;
}
#ibtn:active{opacity:.85}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="htop">

    <div class="htitle">

  <div class="chips-wrap">
    <div class="chips" id="chips"></div>

<!-- LIST -->

  <div id="rc"></div>
  <div id="rows"></div>

</div>

<!-- MODAL -->
<div id="ov">
  <div id="md">

    <div class="mhero">
      <button id="mcls" aria-label="Fechar">✕</button>

      <div class="mname" id="mn"></div>
      <div class="mmeta" id="mm"></div>
    </div>
    <div class="mbody" id="mb"></div>
  </div>
</div>

<!-- INSTALL BANNER -->
<div id="ibanner">
  <div class="ib-row">
    <span class="ib-icon">🍹</span>
    <div class="ib-text">
      <strong>Instalar Bartender Pro</strong>

    No <b>Safari</b>: toque em <b>Compartilhar ⎙</b> → <b>"Adicionar à Tela de Início"</b>
  </div>
</div>

aixo com um peda\u00e7o de lim\u00e3o e gire a borda no sal. | Em uma coqueteleira com gelo, adicione a tequila, o suco de lim\u00e3o, o n\u00e9ctar de agave e os bitters. | Agite bem at\u00e9 ficar bem gelado. | Coe para o copo preparado com gelo. | Guarne\u00e7a com uma fatia de laranja desidratada.","m":"","u":"","h":"","c":"","cp":""},{"n":"\"THE BOWIE\" (DAVID BOWIE)","g":"Celebridades","e":"\u2b50","o":"","r":"60 ml de gin infusionado com ervas (ex: deixe o gin com alecrim ou tomilho por algumas horas e coe) | 15 ml de licor de violeta | 22 ml de suco de lim\u00e3o fresco | 7 ml de xarope simples (partes iguais de a\u00e7\u00facar e \u00e1gua dissolvidos) | Clara de ovo (opcional, para textura sedosa) | Gelo | Glitter comest\u00edvel para decora\u00e7\u00e3o (opcional) | Flor comest\u00edvel para guarni\u00e7\u00e3o | Preparo: | Se usar clara de ovo, fa\u00e7a uma agita\u00e7\u00e3o a seco (sem gelo) dos ingredientes na coqueteleira por cerca de 15 segundos. | Adicione gelo \u00e0 coqueteleira e agite novamente at\u00e9 ficar bem gelado. | Coe duplamente (com um strainer e um coador fino) para um copo cocktail resfriado. | Se desejar, polvilhe um pouco de glitter comest\u00edvel por cima. | Guarne\u00e7a com uma flor comest\u00edvel.","m":"","u":"","h":"","c":"","cp":""},{"n":"\"THE WINEHOUSE\" (AMY WINEHOUSE)","g":"Celebridades","e":"\u2b50","o":"","r":"60 ml de rum envelhecido | 45 ml de suco de grapefruit rosa fresco | 15 ml de licor de cereja (como Cherry Heering) | 2 dashes de Angostura bitters | Gelo | Cereja preta para guarni\u00e7\u00e3o | Preparo: | Em uma coqueteleira com gelo, adicione o rum, o suco de grapefruit, o licor de cereja e os bitters. | Agite bem at\u00e9 ficar bem gelado. | Coe para um copo baixo com gelo grande. | Guarne\u00e7a com uma cereja preta.","m":"","u":"","h":"","c":"","cp":""},{"n":"\"THE WINFREY\" (OPRAH WINFREY)","g":"Celebridades","e":"\u2b50","o":"","r":"90 ml de ch\u00e1 preto ou verde gelado (forte) | 45 ml de vodka ou gin | 30 ml de suco de p\u00eassego | 15 ml de mel l\u00edquido | Algumas folhas de hortel\u00e3 | Gelo | Rodela de p\u00eassego e um raminho de hortel\u00e3 para guarni\u00e7\u00e3o | Preparo: | Em uma coqueteleira, coloque as folhas de hortel\u00e3 e amasse-as levemente com um muddler. | Adicione a vodka ou o gin, o suco de p\u00eassego e o mel. | Adicione gelo e agite bem at\u00e9 ficar bem gelado. | Coe para um copo alto cheio de gelo. | Complete com o ch\u00e1 gelado. | Mexa delicadamente. | Guarne\u00e7a com uma rodela de p\u00eassego e um raminho de hortel\u00e3.","m":"","u":"","h":"","c":"","cp":""},{"n":"\"THE MUSK\" (ELON MUSK)","g":"Celebridades","e":"\u2b50","o":"","r":"60 ml de vodka clara | 30 ml de licor de cura\u00e7ao azul | 30 ml de suco de lim\u00e3o fresco | 15 ml de xarope de agave | Gelo | Gelo seco (opcional, para efeito visual - manuseie com extrema cautela e nunca ingira!) | Twist de lim\u00e3o para guarni\u00e7\u00e3o | Preparo: | Em uma coqueteleira com gelo, adicione a vodka, o licor de cura\u00e7ao azul, o suco de lim\u00e3o e o xarope de agave. | Agite bem at\u00e9 ficar bem gelado. | Coe para um copo cocktail resfriado ou um copo baixo com gelo. | Se usar gelo seco para efeito visual, adicione um pequeno peda\u00e7o ao copo imediatamente antes de servir e avise o consumidor para n\u00e3o tocar ou ingerir. O efeito de fuma\u00e7a durar\u00e1 pouco tempo. | Guarne\u00e7a com um twist de lim\u00e3o.","m":"","u":"","h":"","c":"","cp":""},{"n":"MOSCOW MULE BY MARCELO SERRANO","g":"Celebridades","e":"\ud83e\uded9","o":"","r":"50ml de Vodka | 20ml de Suco de Lim\u00e3o | 20ml de Xarope de A\u00e7\u00facar | 5 Gotas de Angostura. | Espuma de Gengibre | Preparo: Bater todos os ingredientes na coqueteleira, menos a espuma de gengibre. Finalizar com a espuma de gengibre, cobrindo o a mistura. Decorar com fatia de gengibre ou raspas de gengibre.","m":"","u":"","h":"","c":"","cp":""},{"n":"COSMOPOLITAN BY DALE DEGROFF","g":"Celebridades","e":"\ud83c\udf38","o":"","r":"50ml de Vodka Citron | 15ml de Cointreau | 15ml de Suco de Lim\u00e3o | 30ml de Suco de Cranberry | Preparo: Bater todos os ingredientes na coqueteleira, servir em ta\u00e7a coquetel, finalizar com \u00f3leo de casaca de laranja. | 117","m":"","u":"","h":"","c":"","cp":""}];

var grp='Todos',trm='',deferredPrompt=null;

var GRUPOS=['Todos','Collins & Fizz','Spritz & Aperitivos','Highballs','Tropicais',
  'Contempor\u00e2neos','Cl\u00e1ssicos IBA','Modernos IBA','Espumante','Tiki',
  '\u00c1sia Oriental','\u00c1sia & M\u00e9dio Oriente','\u00c1frica','Oceania',
  'Cerveja','Celebridades','Outros'];

function es(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function filtrar(){
  return D.filter(function(d){
    if(grp!=='Todos'&&d.g!==grp) return false;
    if(!trm) return true;
    return (d.n+' '+(d.r||'')+' '+(d.o||'')+' '+d.g).toLowerCase().indexOf(trm)>=0;
  });
}

function render(){
  var list=filtrar();
  var n=list.length;
  document.getElementById('rc').textContent=n+' drink'+(n!==1?'s':'')+' encontrado'+(n!==1?'s':'');
  document.getElementById('badge').textContent=n;
  var rows=document.getElementById('rows');
  var empty=document.getElementById('empty');
  if(!n){rows.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';
  var h='';
  for(var i=0;i<list.length;i++){
    var d=list[i], idx=D.indexOf(d);
    h+='<div class="row" onclick="abrir('+idx+')">'
     +'<div class="dem">'+es(d.e)+'</div>'
     +'<div class="dinf">'
     +'<div class="dn">'+es(d.n)+'</div>'
     +'<div class="dtg">'
     +'<span class="tg tg-g">'+es(d.g)+'</span>'
     +(d.r||d.m?'<span class="tg tg-r">receita</span>':'')
     +'</div></div>'
     +'<div class="darr">&#x203A;</div>'
     +'</div>';
  }
  rows.innerHTML=h;
}

function abrir(i){
  var d=D[i];
  document.getElementById('me').textContent=d.e||'🍸';
  document.getElementById('mn').textContent=d.n||'';
  var meta=[];
  if(d.o) meta.push(d.o);
  if(d.cp) meta.push(d.cp);
  meta.push(d.g);
  document.getElementById('mm').innerHTML=meta.map(function(m){
    return '<span class="mbdg">'+es(m)+'</span>';
  }).join('');
  var b='';
  if(d.r){
    b+='<div class="lbl">🍶 Receita — Ingredientes</div><div class="rbox">'+es(d.r)+'</div>';
  } else {
    b+='<div class="lbl">🍶 Ingredientes</div><div class="nd">Ingredientes n&#xE3;o dispon&#xED;veis.</div>';
  }
  if(d.m){
    b+='<div class="lbl">📋 Modo de Preparo</div><div class="mbox">'+es(d.m)+'</div>';
  }
  if(d.u){
    b+='<div class="lbl">✨ Guarni&#xE7;&#xE3;o</div>'
     +'<div class="gbox"><span>🌿</span><span>'+es(d.u)+'</span></div>';
  }
  if(d.h){
    b+='<div class="lbl">🍽️ Harmoniza&#xE7;&#xE3;o</div><div class="htags">';
    d.h.split(/[,;]/).forEach(function(p){
      if(p.trim()) b+='<span class="htag">'+es(p.trim())+'</span>';
    });
    b+='</div>';
  }
  if(d.c){
    b+='<div class="lbl">💡 Curiosidade</div><div class="cbox">'+es(d.c)+'</div>';
  }
  document.getElementById('mb').innerHTML=b;
  var ov=document.getElementById('ov');
  ov.classList.add('open');
  ov.scrollTop=0;
  document.body.style.overflow='hidden';
}

function fechar(){
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow='';
}

// ── PWA INSTALL ──────────────────────
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  deferredPrompt=e;
  var ib=document.getElementById('ibanner');
  ib.classList.add('show');
});

document.getElementById('ibtn').addEventListener('click',function(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(){
      deferredPrompt=null;
      document.getElementById('ibanner').classList.remove('show');
    });
  }
});

document.getElementById('ibclose').addEventListener('click',function(){
  document.getElementById('ibanner').classList.remove('show');
});

// iOS detection
var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
var isStandalone=window.navigator.standalone===true;
if(isIOS&&!isStandalone){
  var ib=document.getElementById('ibanner');
  document.getElementById('ib-ios-tip').style.display='block';
  document.getElementById('ibtn').style.display='none';
  ib.classList.add('show');
}

window.addEventListener('appinstalled',function(){
  document.getElementById('ibanner').classList.remove('show');
});

// ── INIT ─────────────────────────────
function init(){
  var cf=document.getElementById('chips');
  GRUPOS.forEach(function(s){
    var b=document.createElement('button');
    b.className='chip'+(s==='Todos'?' on':'');
    b.textContent=s;
    b.onclick=function(){
      grp=s;
      cf.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on')});
      b.classList.add('on');
      document.getElementById('list').scrollTop=0;
      render();
    };
    cf.appendChild(b);
  });

  var si=document.getElementById('si');
  si.addEventListener('input',function(){
    trm=si.value.toLowerCase().trim();
    document.getElementById('xbtn').style.display=trm?'block':'none';
    render();
  });
  document.getElementById('xbtn').addEventListener('click',function(){
    si.value=''; trm='';
    this.style.display='none';
    render();
  });
  document.getElementById('mcls').addEventListener('click',fechar);
  document.getElementById('ov').addEventListener('click',function(e){
    if(e.target===this) fechar();
  });
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape') fechar();
  });

  // Swipe down to close modal
  var startY=0;
  document.getElementById('md').addEventListener('touchstart',function(e){
    startY=e.touches[0].clientY;
  },{passive:true});
  document.getElementById('md').addEventListener('touchmove',function(e){
    var dy=e.touches[0].clientY-startY;
    if(dy>60&&document.getElementById('ov').scrollTop===0) fechar();
  },{passive:true});

  render();
}

init();
</script>
